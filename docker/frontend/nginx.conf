server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # react-router-dom uses client-side routing -- any path that isn't a
    # real static file must fall back to index.html, not 404.
    location / {
        try_files $uri /index.html;
    }

    # Vite content-hashes everything under assets/ (e.g. index-a1b2c3d4.js),
    # so a new deploy always ships a new filename -- safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
