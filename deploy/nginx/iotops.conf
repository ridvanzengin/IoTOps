# Copied (not symlinked) onto the shared VM at
# /opt/agritwin/deploy/infra/nginx/conf.d/iotops.conf -- see
# ../scripts/deploy.sh and SERVER_SETUP.md. This file is the reviewed,
# versioned source of truth; the copy on the VM is a deploy artifact, not
# something edited in place. Modeled on agritwin's own app2.conf.example,
# not agritwin.conf -- agritwin.conf already claims the one
# `listen 80 default_server` allowed per conf.d/ directory, so this file
# must not declare one.

# -- HTTP: redirect to HTTPS + certbot ACME challenge -----------------------
server {
    listen 80;
    server_name iotops.online www.iotops.online;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -- HTTPS -------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name iotops.online www.iotops.online;

    ssl_certificate     /etc/letsencrypt/live/iotops.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iotops.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Must come before the general /api/ block -- nginx matches the most
    # specific prefix, and SSE needs buffering off + a long timeout or
    # nginx silently kills/buffers the long-lived connection.
    #
    # proxy_pass targets are all `set $upstream ...; proxy_pass $upstream;`
    # (matching agritwin.conf's own pattern), not a bare static
    # `proxy_pass http://host:port`, so the `resolver` directive above
    # actually re-resolves on the stated valid=30s cadence -- a static
    # proxy_pass hostname is resolved once at nginx startup/reload and
    # cached indefinitely, so any redeploy that recreates backend/frontend
    # (a new container = a new IP) would 502 until the next manual nginx
    # reload otherwise. Confirmed live: this broke on the deploy that
    # added Kafka, recreated frontend, and nginx kept routing to the old IP.
    location /api/event/stream {
        set $upstream http://iotops-backend-1:8000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_read_timeout 24h;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $upstream http://iotops-backend-1:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    location / {
        set $upstream http://iotops-frontend-1:80;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
