services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iotops

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: iotops
      POSTGRES_PASSWORD: iotops
      POSTGRES_DB: iotops
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - iotops

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - iotops

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - iotops

  # Kafka broker for the kafka input plugin (see app/plugin/inputs/kafka.py).
  # Single-node KRaft mode (no Zookeeper). Two listeners: PLAINTEXT for
  # container-to-container traffic (Collector/Automater Telegraf
  # containers, the demo-showcase publisher -- all reach it via
  # "kafka:9092"), HOST for the user's own kafka client tools run directly
  # on the host machine (reach it via "localhost:9094") -- a single
  # listener can't serve both, since Kafka's advertised address must match
  # whichever hostname the client actually used to connect. Only
  # demo-showcase needs it (Manufacturing Line Demo's Kafka input).
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    networks:
      - iotops
    profiles:
      - demo

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Docker-outside-of-Docker: lets the backend manage sibling Telegraf
      # containers on the host's Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Generated Telegraf configs. Backend writes here at /app/runtime;
      # sibling containers it creates are bind-mounted via HOST_RUNTIME_DIR
      # since bind-mount sources are resolved by the host daemon, not by
      # this container's own filesystem view.
      - ${HOST_RUNTIME_DIR:-./runtime}:/app/runtime
    depends_on:
      - mongo
      - timescaledb
      - mosquitto
      - redis
    networks:
      - iotops

  # Executes every Celery task registered on app.celery_app: the tasks
  # custom-telegraf's outputs/celery plugin enqueues on a matched
  # real-time rule (app/automater/tasks.py), and the periodic Query Rule
  # evaluation tick celery-beat below enqueues (app/query_rule/tasks.py).
  # One shared worker for both -- Celery's own default concurrency
  # already means one slow task doesn't fully block others; revisit only
  # if that's actually not enough in practice, not preemptively. Reuses
  # the backend image (same Python env/dependencies) with the command
  # overridden to run a Celery worker instead of the API server.
  celery-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
    depends_on:
      - redis
    networks:
      - iotops

  # Enqueues app.query_rule.tasks.evaluate_due_query_rules onto the same
  # broker every 30s (app.celery_app.conf.beat_schedule) -- Beat only
  # schedules/enqueues, it never executes a task body itself, so it
  # doesn't need Mongo/TimescaleDB connectivity, just the broker. The
  # actual evaluation runs on celery-worker above. See app/query_rule/
  # tasks.py's own comment on why one fixed tick, not a dynamic
  # per-QueryRule schedule.
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    depends_on:
      - redis
    networks:
      - iotops

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - iotops

  # Demo showcase -- 3 curated projects (Apiary/MQTT, Solar/HTTP,
  # Manufacturing/Kafka), the content behind the public read-only demo.
  # Self-provisioning: idempotent-by-name REST calls against the backend
  # on startup, then publishes forever. `docker compose --profile demo up -d`
  demo-showcase:
    build:
      context: examples/demo
    environment:
      BACKEND_BASE_URL: http://backend:8000
      KAFKA_BROKER: kafka:9092
      MQTT_BROKER_HOST: mosquitto
      PUBLISH_INTERVAL_SECONDS: "20"
    restart: unless-stopped
    depends_on:
      - backend
      - mosquitto
      - kafka
    networks:
      - iotops
    profiles:
      - demo

volumes:
  mongo_data:
  timescale_data:
  mosquitto_data:

networks:
  iotops:
    name: iotops
