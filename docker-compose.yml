services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iotops

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: iotops
      POSTGRES_PASSWORD: iotops
      POSTGRES_DB: iotops
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - iotops

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - iotops

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - iotops

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Docker-outside-of-Docker: lets the backend manage sibling Telegraf
      # containers on the host's Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Generated Telegraf configs. Backend writes here at /app/runtime;
      # sibling containers it creates are bind-mounted via HOST_RUNTIME_DIR
      # since bind-mount sources are resolved by the host daemon, not by
      # this container's own filesystem view.
      - ${HOST_RUNTIME_DIR:-./runtime}:/app/runtime
    depends_on:
      - mongo
      - timescaledb
      - mosquitto
      - redis
    networks:
      - iotops

  # Consumes the Celery tasks custom-telegraf's outputs/celery plugin
  # enqueues on a matched rule -- see app/automater/tasks.py. Reuses the
  # backend image (same Python env/dependencies) with the command
  # overridden to run a Celery worker instead of the API server.
  celery-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.automater.tasks", "worker", "--loglevel=info"]
    depends_on:
      - redis
    networks:
      - iotops

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - iotops

  # Manual pipeline-verification tool (Milestone 2), not part of the app.
  # Off by default: `docker compose --profile tools up mqtt-publisher`
  mqtt-publisher:
    build:
      context: examples/mqtt-publisher
    depends_on:
      - mosquitto
    networks:
      - iotops
    profiles:
      - tools

  # Manual rule-condition verification tool (Milestone 5), not part of the
  # app. Companion to the "Rule Testing Sandbox" project's Collector (2
  # mqtt inputs covering tags/numeric/string-field conditions).
  # Off by default: `docker compose --profile tools up rule-testing-publisher`
  rule-testing-publisher:
    build:
      context: examples/rule-testing-publisher
    depends_on:
      - mosquitto
    networks:
      - iotops
    profiles:
      - tools

  # Beekeeping showcase (Milestone 4) -- first end-to-end platform demo.
  # One-command demo from a cold stop, since Compose always includes
  # services with no `profiles:` key regardless of which profile is passed:
  # `docker compose --profile beekeeping up -d`
  beekeeping-simulator:
    build:
      context: examples/beekeeping-simulator
    environment:
      BACKEND_BASE_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
      - mosquitto
    networks:
      - iotops
    profiles:
      - beekeeping

volumes:
  mongo_data:
  timescale_data:
  mosquitto_data:

networks:
  iotops:
    name: iotops
